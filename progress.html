<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .progress-container { width: 100%; background-color: #f0f0f0; border-radius: 5px; }
    .progress-bar { height: 20px; background-color: #4CAF50; border-radius: 5px; transition: width 0.3s; }
    .message { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="message" id="message">Initializing...</div>
  <div class="progress-container">
    <div class="progress-bar" id="progress" style="width: 0%"></div>
  </div>
  <div id="percentage">0%</div>

  <script>
    const { ipcRenderer } = require('electron');
    
    ipcRenderer.on('update-progress', (event, data) => {
      document.getElementById('progress').style.width = data.percentage + '%';
      document.getElementById('percentage').textContent = data.percentage + '%';
      document.getElementById('message').textContent = data.message;
    });
  </script>
</body>
</html>
